<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | PS Tools Terminal</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .admin-nav-pills {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            padding: 2.5rem;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .stat-card p {
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.8rem;
        }

        .quick-actions {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 3rem;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="header-container">
            <a href="/" class="logo"><span>🛠️</span><span>PS<span>Terminal</span></span></a>
            <div class="nav">
                <button id="logoutBtn" class="btn btn-secondary btn-sm"
                    style="padding: 0.5rem 1rem; font-size: 0.9rem;">Disconnect</button>
            </div>
        </div>
    </header>

    <div class="container" style="margin-top: 4rem;">
        <div class="admin-nav-pills">
            <a href="/admin/dashboard.html" class="category-btn active">Overview</a>
            <a href="/admin/tools.html" class="category-btn">Global Toolkit</a>
            <a href="/" target="_blank" class="category-btn">Public Interface</a>
        </div>

        <h1 style="font-size: 3rem; font-weight: 800; margin-bottom: 2rem;">System Status</h1>

        <div class="stats-grid">
            <div class="stat-card">
                <h3 id="totalTools">0</h3>
                <p>Total Modules</p>
            </div>
            <div class="stat-card">
                <h3 id="enabledTools" style="color: var(--secondary);">0</h3>
                <p>Active</p>
            </div>
            <div class="stat-card">
                <h3 id="disabledTools" style="color: var(--accent);">0</h3>
                <p>Standby</p>
            </div>
            <div class="stat-card">
                <h3 id="categoriesCount">0</h3>
                <p>Categorized</p>
            </div>
        </div>

        <div class="quick-actions">
            <h2 style="margin-bottom: 2rem; font-size: 2rem;">Control Center</h2>
            <div class="btn-group">
                <a href="/admin/tools.html" class="btn btn-primary">⚡ Command Toolkit</a>
                <button id="refreshStats" class="btn btn-secondary">🔄 Resync Modules</button>
            </div>
        </div>
    </div>

    <script src="/assets/js/main.js"></script>
    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = '/admin/login.html';

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('adminToken');
            window.location.href = '/admin/login.html';
        });

        async function loadStats() {
            try {
                const response = await fetch('/api/tools/admin', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        localStorage.removeItem('adminToken');
                        window.location.href = '/admin/login.html';
                        return;
                    }
                    throw new Error('Sync failed');
                }

                const data = await response.json();
                const tools = data.tools;

                document.getElementById('totalTools').textContent = tools.length;
                document.getElementById('enabledTools').textContent = tools.filter(t => t.enabled).length;
                document.getElementById('disabledTools').textContent = tools.filter(t => !t.enabled).length;
                document.getElementById('categoriesCount').textContent = new Set(tools.map(t => t.category)).size;
            } catch (error) {
                console.error('Core Sync Error:', error);
                utils.showAlert('Failed to sync system statistics', 'error');
            }
        }

        document.getElementById('refreshStats').addEventListener('click', () => {
            loadStats();
            utils.showAlert('Systems re-synchronized', 'success');
        });

        loadStats();
    </script>
</body>

</html>
