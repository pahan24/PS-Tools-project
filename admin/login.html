<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access | PS Tools</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .login-container {
            max-width: 450px;
            margin: 10vh auto;
            padding: 0 1.5rem;
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 3.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .login-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .login-header h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }
    </style>
</head>

<body class="bg-darker">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Admin Login</h1>
                <p>Welcome back, Commander.</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Identification</label>
                    <input type="text" id="username" class="form-control" placeholder="Username" required
                        autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Secret Key</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required
                        autocomplete="current-password">
                </div>
                <button type="submit" id="loginBtn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    Access Terminal
                </button>
            </form>

            <div style="text-align: center; margin-top: 2rem;">
                <a href="/" style="color: var(--text-dim); text-decoration: none; font-size: 0.9rem;">← Return to
                    Safety</a>
            </div>
        </div>
    </div>

    <script src="/assets/js/main.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            utils.setLoading(loginBtn, true);

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('adminToken', data.token);
                    utils.showAlert('Access Granted. Redirecting...', 'success');
                    setTimeout(() => window.location.href = '/admin/dashboard.html', 1000);
                } else {
                    utils.showAlert(data.message || 'Invalid credentials', 'error');
                }
            } catch (error) {
                console.error('Login error:', error);
                utils.showAlert('Terminal connection failed', 'error');
            } finally {
                utils.setLoading(loginBtn, false);
            }
        });
    </script>
</body>

</html>
