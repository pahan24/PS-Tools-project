<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Toolkit | PS Tools Terminal</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .admin-nav-pills {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .tools-table-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            margin-top: 2rem;
        }

        .tools-table {
            width: 100%;
            border-collapse: collapse;
        }

        .tools-table th {
            text-align: left;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--card-border);
        }

        .tools-table td {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--card-border);
            color: var(--text-main);
        }

        .tools-table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .status-badge {
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-active {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        .status-standby {
            background: rgba(244, 63, 94, 0.1);
            color: #f43f5e;
        }

        /* Premium Toggle */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--primary);
        }

        input:checked+.slider:before {
            transform: translateX(20px);
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="header-container">
            <a href="/" class="logo"><span>🛠️</span><span>PS<span>Terminal</span></span></a>
            <div class="nav">
                <button id="logoutBtn" class="btn btn-secondary btn-sm"
                    style="padding: 0.5rem 1rem; font-size: 0.9rem;">Disconnect</button>
            </div>
        </div>
    </header>

    <div class="container" style="margin-top: 4rem;">
        <div class="admin-nav-pills">
            <a href="/admin/dashboard.html" class="category-btn">Overview</a>
            <a href="/admin/tools.html" class="category-btn active">Global Toolkit</a>
            <a href="/" target="_blank" class="category-btn">Public Interface</a>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2.5rem;">
            <div>
                <h1 style="font-size: 3rem; font-weight: 800;">Global Toolkit</h1>
                <p style="color: var(--text-muted); font-size: 1.1rem;">Manage module parameters and availability.</p>
            </div>
            <div class="search-bar" style="margin: 0; max-width: 350px;">
                <span class="search-icon">🔍</span>
                <input type="text" id="toolSearch" placeholder="Filter modules..."
                    style="padding: 0.75rem 1rem 0.75rem 3rem; border-radius: var(--radius-md);">
            </div>
        </div>

        <div class="tools-table-container">
            <table class="tools-table">
                <thead>
                    <tr>
                        <th style="width: 60px;">ID</th>
                        <th>Module Name</th>
                        <th>Categorization</th>
                        <th>Network Status</th>
                        <th>Control</th>
                    </tr>
                </thead>
                <tbody id="toolsList">
                    <!-- Dynamic injection -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="/assets/js/main.js"></script>
    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = '/admin/login.html';

        let allTools = [];

        async function loadTools() {
            try {
                const response = await fetch('/api/tools/admin', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                allTools = data.tools;
                renderTools(allTools);
            } catch (error) {
                utils.showAlert('Module synchronization failed', 'error');
            }
        }

        function renderTools(tools) {
            const list = document.getElementById('toolsList');
            list.innerHTML = '';
            tools.forEach(tool => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-size: 1.5rem; opacity: 0.8; text-align: center;">${tool.icon}</td>
                    <td><div style="font-weight: 700;">${tool.name}</div><div style="font-size: 0.85rem; color: var(--text-dim);">${tool.path}</div></td>
                    <td><span class="tool-category" style="margin: 0;">${tool.category}</span></td>
                    <td>
                        <span class="status-badge ${tool.enabled ? 'status-active' : 'status-standby'}">
                            ${tool.enabled ? 'Active' : 'Standby'}
                        </span>
                    </td>
                    <td>
                        <label class="toggle-switch">
                            <input type="checkbox" ${tool.enabled ? 'checked' : ''} onchange="toggleModule('${tool.id}', this.checked)">
                            <span class="slider"></span>
                        </label>
                    </td>
                `;
                list.appendChild(tr);
            });
        }

        async function toggleModule(id, state) {
            try {
                const response = await fetch(`/api/tools/${id}/toggle`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                if (!response.ok) throw new Error();
                utils.showAlert(`Module ${id} ${state ? 'activated' : 'deactivated'}`, 'success');
                loadTools();
            } catch (error) {
                utils.showAlert('Control signal failed', 'error');
                loadTools();
            }
        }

        document.getElementById('toolSearch').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            const filtered = allTools.filter(t => t.name.toLowerCase().includes(q) || t.category.toLowerCase().includes(q));
            renderTools(filtered);
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('adminToken');
            window.location.href = '/admin/login.html';
        });

        loadTools();
    </script>
</body>

</html>
