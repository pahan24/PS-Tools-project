<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name=viewport content="width=device-width, initial-scale=1.0">
    <title>AI Code Generator - PS Tools</title>
    <meta name="description" content="Generate code snippets with AI">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
            <header class="header">
        <div class="header-container">
            <a href="/" class="logo">
                <span>🛠️</span>
                <span>PS<span>Tools</span></span>
            </a>
            <nav class="nav">
                <a href="/">Home</a>
                <a href="/super/ai-studio.html" class="super-link">AI Studio</a>
                <a href="/guide/master-guide.html">Master Guide</a>
                <a href="/admin/login.html">Admin</a>
            </nav>
        </div>
    </header>

    <div class="container tool-page">
        <div class="tool-header">
            <h1><span>💻</span> AI Code Generator</h1>
            <p>Generate code snippets with AI</p>
        </div>

        <div class="tool-content">
            
      <div class="form-group">
        <label for="prompt">Enter your prompt:</label>
        <textarea id="prompt" class="form-control" rows="6" placeholder="Describe what you want..."></textarea>
      </div>
      
      <div class="btn-group">
        <button id="generateBtn" class="btn btn-primary">💻 Generate</button>
        <button id="clearBtn" class="btn btn-outline">Clear</button>
      </div>
      <div id="result" class="result-box hidden"></div>
      <div class="btn-group mt-2 hidden" id="actionButtons">
        <button id="copyBtn" class="btn btn-secondary">📋 Copy</button>
        <button id="downloadBtn" class="btn btn-secondary">💾 Download</button>
      </div>
        </div>
    </div>

            <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2025 PS Tools. Engineered for performance.</p>
        </div>
    </footer>

    <script src="/assets/js/main.js"></script>
    <script>
        const generateBtn = document.getElementById('generateBtn');
const prompt = document.getElementById('prompt');
const language = document.getElementById('language');
const result = document.getElementById('result');

generateBtn.addEventListener('click', async () => {
  if (!prompt.value.trim()) { utils.showAlert('Please enter a prompt', 'warning'); return; }
  utils.setLoading(generateBtn, true);
  try {
    const response = await api.generateCode(prompt.value, language?.value || 'javascript');
    result.textContent = response.code;
    result.classList.remove('hidden');
    document.getElementById('actionButtons').classList.remove('hidden');
  } catch (error) {
    utils.showAlert('Error: ' + error.message, 'error');
  } finally {
    utils.setLoading(generateBtn, false);
  }
});

document.getElementById('clearBtn').addEventListener('click', () => {
  prompt.value = ''; result.classList.add('hidden');
});

document.getElementById('copyBtn').addEventListener('click', () => utils.copyToClipboard(result.textContent));
document.getElementById('downloadBtn').addEventListener('click', () => utils.downloadText(result.textContent, 'code.' + (language?.value || 'js')));
    </script>
</body>
</html>
