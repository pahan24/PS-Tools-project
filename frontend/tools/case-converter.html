<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name=viewport content="width=device-width, initial-scale=1.0">
    <title>Case Converter - PS Tools</title>
    <meta name="description" content="Convert text case (upper, lower, title)">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
            <header class="header">
        <div class="header-container">
            <a href="/" class="logo">
                <span>🛠️</span>
                <span>PS<span>Tools</span></span>
            </a>
            <nav class="nav">
                <a href="/">Home</a>
                <a href="/super/ai-studio.html" class="super-link">AI Studio</a>
                <a href="/guide/master-guide.html">Master Guide</a>
                <a href="/admin/login.html">Admin</a>
            </nav>
        </div>
    </header>

    <div class="container tool-page">
        <div class="tool-header">
            <h1><span>🔤</span> Case Converter</h1>
            <p>Convert text case (upper, lower, title)</p>
        </div>

        <div class="tool-content">
            
      <div class="form-group">
        <label for="textInput">Enter Text:</label>
        <textarea id="textInput" class="form-control" rows="8" placeholder="Paste or type your text here..."></textarea>
      </div>
      <div class="btn-group">
        <button id="processBtn" class="btn btn-primary">🔤 Process</button>
        <button id="clearBtn" class="btn btn-outline">Clear</button>
      </div>
      <div id="result" class="result-box hidden"></div>
      <div id="stats" class="stats hidden"></div>
      <div class="btn-group mt-2 hidden" id="actionButtons">
        <button id="copyBtn" class="btn btn-secondary">📋 Copy</button>
        <button id="downloadBtn" class="btn btn-secondary">💾 Download</button>
      </div>
        </div>
    </div>

            <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2025 PS Tools. Engineered for performance.</p>
        </div>
    </footer>

    <script src="/assets/js/main.js"></script>
    <script>
        const textInput = document.getElementById('textInput');
const result = document.getElementById('result');

document.querySelectorAll('[data-case]').forEach(btn => {
  btn.addEventListener('click', () => {
    const caseType = btn.dataset.case;
    result.textContent = textUtils.convertCase(textInput.value, caseType);
    result.classList.remove('hidden');
    document.getElementById('actionButtons').classList.remove('hidden');
  });
});

document.getElementById('copyBtn').addEventListener('click', () => utils.copyToClipboard(result.textContent));
document.getElementById('downloadBtn').addEventListener('click', () => utils.downloadText(result.textContent, 'converted.txt'));
    </script>
</body>
</html>
