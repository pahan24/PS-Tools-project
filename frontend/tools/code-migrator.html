<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name=viewport content="width=device-width, initial-scale=1.0">
    <title>AI Code Migrator - PS Tools</title>
    <meta name="description" content="Migrate code between languages">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>
    <header class="header">
        <div class="header-container">
            <a href="/" class="logo">
                <span>🛠️</span>
                <span>PS<span>Tools</span></span>
            </a>
            <nav class="nav">
                <a href="/">Home</a>
                <a href="/super/ai-studio.html" class="super-link">AI Studio</a>
                <a href="/guide/master-guide.html">Master Guide</a>
                <a href="/admin/login.html">Admin</a>
            </nav>
        </div>
    </header>

    <div class="container tool-page">
        <div class="tool-header">
            <h1><span>🔄</span> AI Code Migrator</h1>
            <p>Migrate code between languages</p>
        </div>

        <div class="tool-content">
            <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                <div style="flex: 1;">
                    <label for="sourceLang">Source Language:</label>
                    <input type="text" id="sourceLang" class="form-control" placeholder="e.g. Python">
                </div>
                <div style="flex: 1;">
                    <label for="targetLang">Target Language:</label>
                    <input type="text" id="targetLang" class="form-control" placeholder="e.g. JavaScript">
                </div>
            </div>

            <div class="form-group">
                <label for="sourceCode">Source Code:</label>
                <textarea id="sourceCode" class="form-control" rows="8" placeholder="Paste your code here..."
                    style="font-family: monospace;"></textarea>
            </div>

            <div class="btn-group">
                <button id="generateBtn" class="btn btn-primary">🔄 Migrate Code</button>
                <button id="clearBtn" class="btn btn-outline">Clear</button>
            </div>

            <div id="result" class="result-box hidden"
                style="white-space: pre-wrap; font-family: monospace; background: #1e1e1e; color: #d4d4d4;"></div>

            <div class="btn-group mt-2 hidden" id="actionButtons">
                <button id="copyBtn" class="btn btn-secondary">📋 Copy Code</button>
                <button id="downloadBtn" class="btn btn-secondary">💾 Download</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2025 PS Tools. Engineered for performance.</p>
        </div>
    </footer>

    <script src="/assets/js/main.js"></script>
    <script>
        const generateBtn = document.getElementById('generateBtn');
        const clearBtn = document.getElementById('clearBtn');
        const sourceCode = document.getElementById('sourceCode');
        const sourceLang = document.getElementById('sourceLang');
        const targetLang = document.getElementById('targetLang');
        const result = document.getElementById('result');
        const actionButtons = document.getElementById('actionButtons');

        generateBtn.addEventListener('click', async () => {
            if (!sourceCode.value.trim() || !targetLang.value.trim()) {
                utils.showAlert('Please provide both code and target language', 'warning');
                return;
            }
            utils.setLoading(generateBtn, true);
            try {
                const prompt = `Convert the following ${sourceLang.value || 'code'} to ${targetLang.value}. Provide only the converted code without explanations.\n\nCode:\n${sourceCode.value}`;
                const response = await api.generateCode(prompt, targetLang.value);
                result.textContent = response.text || response.code || response;
                if (typeof result.textContent === 'object') result.textContent = response.text;
                result.classList.remove('hidden');
                actionButtons.classList.remove('hidden');
                utils.showAlert('Code migrated successfully!', 'success');
            } catch (error) {
                utils.showAlert('Failed to migrate: ' + error.message, 'error');
            } finally {
                utils.setLoading(generateBtn, false);
            }
        });

        clearBtn.addEventListener('click', () => {
            sourceCode.value = '';
            result.textContent = '';
            result.classList.add('hidden');
            actionButtons.classList.add('hidden');
        });

        document.getElementById('copyBtn').addEventListener('click', () => utils.copyToClipboard(result.textContent));
        document.getElementById('downloadBtn').addEventListener('click', () => utils.downloadText(result.textContent, 'migrated-code.txt'));
    </script>
</body>

</html>
