<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name=viewport content="width=device-width, initial-scale=1.0">
    <title>Word Counter - PS Tools</title>
    <meta name="description" content="Count words, characters, and sentences">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
            <header class="header">
        <div class="header-container">
            <a href="/" class="logo">
                <span>🛠️</span>
                <span>PS<span>Tools</span></span>
            </a>
            <nav class="nav">
                <a href="/">Home</a>
                <a href="/super/ai-studio.html" class="super-link">AI Studio</a>
                <a href="/guide/master-guide.html">Master Guide</a>
                <a href="/admin/login.html">Admin</a>
            </nav>
        </div>
    </header>

    <div class="container tool-page">
        <div class="tool-header">
            <h1><span>📊</span> Word Counter</h1>
            <p>Count words, characters, and sentences</p>
        </div>

        <div class="tool-content">
            
      <div class="form-group">
        <label for="textInput">Enter Text:</label>
        <textarea id="textInput" class="form-control" rows="8" placeholder="Paste or type your text here..."></textarea>
      </div>
      <div class="btn-group">
        <button id="processBtn" class="btn btn-primary">📊 Process</button>
        <button id="clearBtn" class="btn btn-outline">Clear</button>
      </div>
      <div id="result" class="result-box hidden"></div>
      <div id="stats" class="stats hidden"></div>
      <div class="btn-group mt-2 hidden" id="actionButtons">
        <button id="copyBtn" class="btn btn-secondary">📋 Copy</button>
        <button id="downloadBtn" class="btn btn-secondary">💾 Download</button>
      </div>
        </div>
    </div>

            <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2025 PS Tools. Engineered for performance.</p>
        </div>
    </footer>

    <script src="/assets/js/main.js"></script>
    <script>
        const textInput = document.getElementById('textInput');
const processBtn = document.getElementById('processBtn');
const stats = document.getElementById('stats');

processBtn.addEventListener('click', () => {
  const text = textInput.value;
  const words = textUtils.countWords(text);
  const chars = textUtils.countCharacters(text, true);
  const charsNoSpaces = textUtils.countCharacters(text, false);
  const sentences = textUtils.countSentences(text);
  const paragraphs = textUtils.countParagraphs(text);
  
  stats.innerHTML = `
    <div class="stat-item"><div class="stat-value">${utils.formatNumber(words)}</div><div class="stat-label">Words</div></div>
    <div class="stat-item"><div class="stat-value">${utils.formatNumber(chars)}</div><div class="stat-label">Characters</div></div>
    <div class="stat-item"><div class="stat-value">${utils.formatNumber(charsNoSpaces)}</div><div class="stat-label">Characters (no spaces)</div></div>
    <div class="stat-item"><div class="stat-value">${utils.formatNumber(sentences)}</div><div class="stat-label">Sentences</div></div>
    <div class="stat-item"><div class="stat-value">${utils.formatNumber(paragraphs)}</div><div class="stat-label">Paragraphs</div></div>
  `;
  stats.classList.remove('hidden');
});

textInput.addEventListener('input', () => processBtn.click());
    </script>
</body>
</html>
